name: Machine Stop (nighttime)

on:
  schedule:
    - cron: '0 20 * * *'  # 22:00 CEST / 21:00 CET
  workflow_dispatch:

jobs:
  stop:
    name: Stop Fly machine
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          MACHINE_ID=$(flyctl machine list --app exam-record-beta --json | jq -r '.[0].id')
          flyctl machine stop "$MACHINE_ID" --app exam-record-beta
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
