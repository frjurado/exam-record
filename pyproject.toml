[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
testpaths = ["tests"]
addopts = [
    "--cov=app",
    "--cov-report=html",
    "--cov-report=term-missing",
    "--cov-fail-under=70",
]
filterwarnings = [
    "error::DeprecationWarning",
    "ignore::DeprecationWarning:httpx.*",
    "ignore::DeprecationWarning:sqlalchemy.*",
    "ignore::RuntimeWarning",
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
disallow_untyped_defs = true

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501", "B008", "UP017"]  # B008: Depends() in defaults is standard FastAPI pattern; UP017: prefer timezone.utc over datetime.UTC for portability

[tool.ruff.lint.flake8-quotes]
docstring-quotes = "double"
inline-quotes = "double"

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint.per-file-ignores]
"alembic/env.py" = ["E402"]  # App imports must follow Alembic config/logging setup
